services:
  postgres:
    image: postgres:16-alpine
    container_name: devpinger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devpinger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpinger}
      POSTGRES_DB: ${POSTGRES_DB:-devpinger}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-devpinger} -d ${POSTGRES_DB:-devpinger}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devpinger-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: devpinger-migrate
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-devpinger}:${POSTGRES_PASSWORD:-devpinger}@postgres:5432/${POSTGRES_DB:-devpinger}
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    entrypoint: []
    command: ['pnpm', '--filter', '@devpinger/db', 'migrate']
    restart: 'no'

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: devpinger-server
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-devpinger}:${POSTGRES_PASSWORD:-devpinger}@postgres:5432/${POSTGRES_DB:-devpinger}
      REDIS_URL: redis://redis:6379
      PORT: '3001'
    ports:
      - '${SERVER_PORT:-3001}:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: devpinger-worker
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-devpinger}:${POSTGRES_PASSWORD:-devpinger}@postgres:5432/${POSTGRES_DB:-devpinger}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
