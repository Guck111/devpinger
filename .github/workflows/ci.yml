name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: devpinger
          POSTGRES_PASSWORD: devpinger
          POSTGRES_DB: devpinger_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U devpinger"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm biome check .

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Migrate (Drizzle)
        env:
          DATABASE_URL: postgres://devpinger:devpinger@localhost:5432/devpinger_ci
        run: pnpm db:migrate

      - name: Verify migrations match schema
        env:
          DATABASE_URL: postgres://devpinger:devpinger@localhost:5432/devpinger_ci
        run: pnpm --filter @devpinger/db exec drizzle-kit check

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm -r build

  deploy:
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply migrations to production DB
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: pnpm db:migrate

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /opt/devpinger
            git fetch --tags --prune
            git reset --hard origin/main
            bash infra/deploy.sh
